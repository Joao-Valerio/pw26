<div class="content-card">
  <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
    <div>
      <div class="section-title">ChartAreaInteractive</div>
      <p class="section-copy">Evolucao mensal dos gastos exibida como area interativa.</p>
    </div>
    <span class="tag">dados agregados</span>
  </div>

  <div class="chart-shell">
    <svg viewBox="0 0 420 180" class="w-100" role="img" aria-label="Grafico de area de gastos">
      <defs>
        <linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#55d6c2" stop-opacity="0.45"></stop>
          <stop offset="100%" stop-color="#55d6c2" stop-opacity="0.04"></stop>
        </linearGradient>
      </defs>
      <polygon points="{{ area_chart_fill }}" fill="url(#areaFill)"></polygon>
      <polyline points="{{ area_chart_points }}" fill="none" stroke="#55d6c2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
    </svg>

    <div class="chart-legend">
      {% for item in area_chart_items %}
        <span class="chart-legend-item">
          <span class="dot" style="background:{% cycle '#55d6c2' '#7c5cfc' '#f0c040' '#f47458' '#44b0ff' '#99f6e4' %}"></span>
          {{ item.label }}: R$ {{ item.value|floatformat:0 }}
        </span>
      {% endfor %}
    </div>
  </div>
</div>

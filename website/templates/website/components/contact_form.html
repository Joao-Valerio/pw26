<div class="form-shell">
  <div class="section-title mb-2">ContactForm</div>
  <p class="section-copy mb-4">Formulario do modulo de contato, equivalente ao componente do diagrama.</p>

  <form method="post" class="row g-3">
    {% csrf_token %}
    {% for field in form %}
      <div class="{% if field.name == 'mensagem' %}col-12{% else %}col-md-6{% endif %}">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger small mt-2">{{ field.errors|join:", " }}</div>
        {% endif %}
      </div>
    {% endfor %}
    <div class="col-12">
      <button type="submit" class="btn-accent">Enviar mensagem</button>
    </div>
  </form>
</div>
